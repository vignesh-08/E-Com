<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraStyle | Premium E-Commerce Hub</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Main Stylesheet -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Sticky Navigation Header -->
    <header class="header">
        <div class="header-container">
            <div class="logo-area">
                <a href="#" class="logo">
                    <span class="logo-accent">Aura</span>Style
                </a>
            </div>

            <!-- Dynamic Header Controls -->
            <div class="header-actions">
                <!-- Theme Toggle Button -->
                <button id="theme-toggle" class="icon-btn" aria-label="Toggle Theme">
                    <!-- Moon Icon (shown in light mode) -->
                    <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                    <!-- Sun Icon (shown in dark mode) -->
                    <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>

                <!-- Cart Button with Count Badge -->
                <button id="cart-btn" class="cart-btn" aria-label="View Cart">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span id="cart-count" class="cart-badge">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Filters and Utilities Bar (Sticky Sub-header) -->
    <section class="filters-bar">
        <div class="filters-container">
            <!-- Real-time Search Box -->
            <div class="search-box">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="search-input" placeholder="Search products by name..." aria-label="Search products">
                <button id="search-clear" class="clear-btn" aria-label="Clear Search" style="display: none;">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="18" y1="6" x2="6" y2="18"></line>
                        <line x1="6" y1="6" x2="18" y2="18"></line>
                    </svg>
                </button>
            </div>

            <!-- Select Filters Group -->
            <div class="select-group">
                <!-- Category Dropdown -->
                <div class="select-wrapper">
                    <select id="category-filter" aria-label="Filter by Category">
                        <option value="all">All Categories</option>
                        <option value="electronics">Electronics</option>
                        <option value="fashion">Fashion</option>
                        <option value="footwear">Footwear</option>
                        <option value="accessories">Accessories</option>
                        <option value="home decor">Home Decor</option>
                    </select>
                </div>

                <!-- Sorting Dropdown -->
                <div class="select-wrapper">
                    <select id="price-sort" aria-label="Sort by Price">
                        <option value="default">Sort: Default</option>
                        <option value="low-to-high">Price: Low to High</option>
                        <option value="high-to-low">Price: High to Low</option>
                    </select>
                </div>
            </div>
        </div>
    </section>

    <!-- Main Content Area -->
    <main class="main-content">
        <!-- Results Counter & Info -->
        <div class="results-info">
            <h1 class="main-title">Discover Our Products</h1>
            <p id="results-count" class="results-text">Showing all products</p>
        </div>

        <!-- Dynamic Product Listing Grid -->
        <div id="product-grid" class="product-grid">
            <!-- Product cards will be dynamically injected here via JavaScript -->
        </div>

        <!-- Empty State Message -->
        <div id="empty-state" class="empty-state" style="display: none;">
            <div class="empty-state-icon">
                <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    <line x1="8" y1="11" x2="14" y2="11"></line>
                </svg>
            </div>
            <h2>No Products Found</h2>
            <p>We couldn't find anything matching your filters or search terms. Try refining your selection.</p>
            <button id="reset-filters-btn" class="btn btn-primary">Reset All Filters</button>
        </div>
    </main>

    <!-- Shopping Cart Side Drawer -->
    <div id="cart-overlay" class="cart-overlay" aria-hidden="true"></div>
    <div id="cart-drawer" class="cart-drawer" aria-hidden="true" role="dialog" aria-labelledby="cart-drawer-title">
        <div class="cart-drawer-header">
            <h2 id="cart-drawer-title">Shopping Cart (<span id="cart-drawer-count">0</span>)</h2>
            <button id="cart-close" class="icon-btn close-btn" aria-label="Close Cart">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        
        <!-- Cart Items List (Dynamic) -->
        <div id="cart-items" class="cart-drawer-body">
            <!-- Cart items will be dynamically injected here -->
        </div>

        <!-- Cart Summary Footer -->
        <div class="cart-drawer-footer">
            <div class="cart-summary-row">
                <span>Subtotal</span>
                <span id="cart-subtotal">₹0.00</span>
            </div>
            <p class="shipping-info">Shipping & taxes calculated at checkout.</p>
            <div class="cart-actions">
                <button id="checkout-btn" class="btn btn-primary btn-block">Proceed to Checkout</button>
                <button id="clear-cart-btn" class="btn btn-secondary btn-block">Clear Cart</button>
            </div>
        </div>
    </div>

    <!-- Notification Toast (For user feedback when adding to cart) -->
    <div id="toast-container" class="toast-container"></div>

    <!-- Footer -->
    <footer class="footer">
        <div class="footer-container">
            <p>&copy; 2026 AuraStyle Store </p>
            <p class="footer-subtext">All rights reserved</p>
        </div>
    </footer>

    <!-- Main JavaScript File -->
    <script src="script.js"></script>
</body>
</html>
